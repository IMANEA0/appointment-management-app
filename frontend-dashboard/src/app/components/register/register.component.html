<div class="auth-shell">
  <mat-card class="auth-card">
    <div class="auth-header">
      <span class="mark" aria-hidden="true"></span>
      <div class="titles">
        <h1>Mes Rendez-vous</h1>
        <p class="tagline">Creez un compte pour commencer.</p>
      </div>
    </div>

    <h2>Inscription</h2>

    <form [formGroup]="form" (ngSubmit)="register()">
      <mat-form-field appearance="outline">
        <mat-label>Nom (optionnel)</mat-label>
        <input matInput formControlName="name" autocomplete="name" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" autocomplete="email" />
        <mat-error *ngIf="email.touched && email.hasError('required')">Email obligatoire</mat-error>
        <mat-error *ngIf="email.touched && email.hasError('email')">Email invalide</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Mot de passe</mat-label>
        <input matInput formControlName="password" type="password" autocomplete="new-password" />
        <mat-error *ngIf="password.touched && password.hasError('required')">
          Mot de passe obligatoire
        </mat-error>
        <mat-error *ngIf="password.touched && password.hasError('minlength')">
          Minimum 6 caracteres
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Confirmer le mot de passe</mat-label>
        <input
          matInput
          formControlName="confirmPassword"
          type="password"
          autocomplete="new-password"
        />
        <mat-error *ngIf="confirmPassword.touched && confirmPassword.hasError('required')">
          Confirmation obligatoire
        </mat-error>
        <mat-error *ngIf="confirmPassword.touched && form.hasError('passwordMismatch')">
          Les mots de passe ne correspondent pas
        </mat-error>
      </mat-form-field>

      <button mat-raised-button type="submit" class="brand-btn" [disabled]="submitting">
        {{ submitting ? 'Creation...' : "S'inscrire" }}
      </button>
    </form>

    <div class="switch-link">
      <span>Deja un compte ?</span>
      <a mat-button class="link-btn" routerLink="/login">Se connecter</a>
    </div>
  </mat-card>
</div>
